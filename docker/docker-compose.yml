services:
  # ==================== POSTGRESQL ====================
  postgres:
    image: postgres:16-alpine
    container_name: investment-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-investment_tracker}
      POSTGRES_USER: ${POSTGRES_USER:-investor}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-Inv3stm3ntS3cur3P@ss2024!}
    volumes:
      # Volumen persistente para datos
      - postgres_data:/var/lib/postgresql/data
      # Scripts de inicialización (se ejecutan en orden alfabético)
      - ../database/sql/01_schema.sql:/docker-entrypoint-initdb.d/01_schema.sql
      - ../database/sql/02_functions.sql:/docker-entrypoint-initdb.d/02_functions.sql
      - ../database/sql/03_seed.sql:/docker-entrypoint-initdb.d/03_seed.sql
      - ./postgres/init.sql:/docker-entrypoint-initdb.d/00_init.sql
    ports:
      - "5432:5432"
    networks:
      - investment-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-investor} -d ${POSTGRES_DB:-investment_tracker}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

 # ==================== PGADMIN ====================
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: investment-pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@investment-tracker.com
      PGADMIN_DEFAULT_PASSWORD: Admin123!
      PGADMIN_CONFIG_SERVER_MODE: 'False'
    volumes:
      - pgadmin_data:/var/lib/pgadmin
      - ./pgadmin/servers.json:/pgadmin4/servers.json
    ports:
      - "5050:80"
    networks:
      - investment-network
    depends_on:
      postgres:
        condition: service_healthy
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ==================== BACKEND ====================
  backend:
    build:
      context: ..
      dockerfile: docker/Dockerfile.backend
    image: investment-backend:latest
    container_name: investment-backend
    restart: unless-stopped
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB}
      SPRING_DATASOURCE_USERNAME: ${DB_USER}
      SPRING_DATASOURCE_PASSWORD: ${DB_PASSWORD}
      JWT_SECRET: ${JWT_SECRET}
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE}
    ports:
      - "8081:8080"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - investment-network

  # ==================== FRONTEND ====================
  frontend:
    build:
      context: ..
      dockerfile: docker/Dockerfile.frontend
    image: investment-frontend:latest
    container_name: investment-frontend
    restart: unless-stopped
    environment:
      - REACT_APP_API_URL=https://localhost/api
      - REACT_APP_ENVIRONMENT=development
    ports:
      - "3000:3000"
    depends_on:
      - backend
    networks:
      - investment-network

  # ==================== NGINX REVERSE PROXY ====================
  nginx:
    image: nginx:alpine
    container_name: investment-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
      - ./nginx/ssl:/etc/nginx/ssl
    depends_on:
      - frontend
      - backend
    networks:
      - investment-network

# ==================== VOLÚMENES ====================
volumes:
  postgres_data:
    driver: local
    name: investment_postgres_data
  pgadmin_data:
    driver: local
    name: investment_pgadmin_data
    
# ==================== REDES ====================
networks:
  investment-network:
    driver: bridge
    name: investment_network